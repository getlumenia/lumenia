name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Lumenia's roadmap is grant-driven, so not every request
        fits the current scope — but we read all of them. For open-ended discussion,
        consider starting a **Discussion** instead of an issue.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The user need or pain point behind the request.
      placeholder: As someone receiving money by link, I can't …
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why this one is better.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Fit
      options:
        - label: This keeps Lumenia non-custodial and free of yield/savings/bank framing.
          required: false
        - label: This keeps the recipient experience walletless (no seed phrase, no gas).
          required: false
